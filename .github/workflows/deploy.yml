name: Deploy slides

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: upload slides
        uses: actions/upload-pages-artifact@v4
        with:
          path: slides

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
