<!doctype html>
<html>
  <head>
    <title>Workshop: Agent and Skills</title>
    <link rel="stylesheet" href="https://unpkg.com/reveal.js@6.0.0/dist/reveal.css" />
    <link rel="stylesheet" href="https://unpkg.com/reveal.js@6.0.0/dist/theme/dracula.css" />
    <style>
.reveal .slides section p img {
  border: 4px solid transparent;
  border-radius: 16px;
  background:
    linear-gradient(#0000, #0000) padding-box,
    linear-gradient(-45deg, #743ad5, #d53a9d) border-box;
}

.reveal .slides section pre code {
  padding: 16px;
  border: 2px solid;
  border-image: linear-gradient(-45deg, #743ad5, #d53a9d) 1;
}
    </style>
  </head>
  <body>
    <div class="reveal">
      <div class="slides">
        <section
          data-markdown="slides.md"
          data-separator="^\n\n\n"
          data-separator-vertical="^\n\n"
          data-separator-notes="^Note:"
          data-charset="UTF-8"
        >
        </section>
      </div>
    </div>
    <script src="https://unpkg.com/reveal.js@6.0.0/dist/reveal.js"></script>
    <script src="https://unpkg.com/reveal.js@6.0.0/dist/plugin/markdown.js"></script>
    <script>
      Reveal.initialize({
        plugins: [RevealMarkdown],
        slideNumber: true,
        hash: true,
        hashOneBasedIndex: true,
      });
    </script>
  </body>
</html>
